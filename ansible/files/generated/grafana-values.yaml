# Generated by render-domains.sh — do not edit.
service:
  type: ClusterIP

grafana.ini:
  server:
    root_url: "https://grafana.lab.local/"
    domain: "grafana.lab.local"
  auth:
    disable_login_form: false
  auth.anonymous:
    enabled: false
  dashboards:
    default_home_dashboard_path: /var/lib/grafana/dashboards/spark-lab/00-lab-overview.json

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.monitoring.svc.cluster.local:80
        isDefault: true
        editable: false

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: spark-lab
        orgId: 1
        folder: DGX Spark Lab
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards/spark-lab

extraConfigmapMounts:
  - name: spark-lab-dashboards
    configMap: grafana-dashboards-spark-lab
    mountPath: /var/lib/grafana/dashboards/spark-lab
    readOnly: true
    subPath: ""
