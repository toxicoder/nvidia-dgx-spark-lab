# Purpose: Example cloud-init user-data for two-node DGX Spark cluster
# Source of truth: ansible/inventory/hosts.ini.example
# Regenerate: n/a
# Safety: example only; customize high-speed IPs before use

#cloud-config
# Example for node in 2-node setup (high-speed dual 400G).
# Customize IPs/interfaces per node (spark0 suffix 1, spark1 suffix 2).

hostname: { { inventory_hostname | default('spark0') } }

package_update: true
packages:
  - curl
  - wget
  - ca-certificates
  - gnupg
  - lsb-release
  - jq
  - nfs-common
  - open-iscsi
  - rdma-core
  - ibverbs-utils
  - python3-pip

swap:
  filename: /swapfile
  size: 0

write_files:
  - path: /etc/netplan/99-highspeed.yaml
    permissions: "0644"
    content: |
      network:
        version: 2
        ethernets:
          enp1s0f0np0:
            dhcp4: false
            addresses:
              - 192.168.100.{{ '1' if inventory_hostname == 'spark0' else '2' }}/24
          enp1s0f1np1:
            dhcp4: false
            addresses:
              - 192.168.101.{{ '1' if inventory_hostname == 'spark0' else '2' }}/24

runcmd:
  - swapoff -a || true
  - sed -i '/ swap / s/^/#/' /etc/fstab || true
  - modprobe overlay || true
  - modprobe br_netfilter || true
  - modprobe ib_uverbs || true
  - sysctl -w net.bridge.bridge-nf-call-iptables=1 || true
  - sysctl -w net.bridge.bridge-nf-call-ip6tables=1 || true
  - sysctl -w net.ipv4.ip_forward=1 || true
  - netplan apply || true
  - |
    if [ ! -f /home/ubuntu/.ssh/id_ed25519 ]; then
      sudo -u ubuntu ssh-keygen -t ed25519 -f /home/ubuntu/.ssh/id_ed25519 -N "" -q
    fi
  - echo "2-node highspeed cloud-init prep done. Run peer key exchange + ansible bootstrap next."

users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL

final_message: |
  2-node DGX high-speed prep via cloud-init complete.
  Validate: ip link, ping on 192.168.100.x, then ansible.
