# Purpose: Helm service template exposing lab-dashboard via NodePort
# Source of truth: helm/lab-dashboard/values.yaml
# Regenerate: n/a
# Safety: NodePort exposure; restrict access on untrusted networks

apiVersion: v1
kind: Service
metadata:
  name: {{ include "lab-dashboard.fullname" . }}
  labels:
    {{- include "lab-dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if (and (eq .Values.service.type "NodePort") .Values.service.nodePort) }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "lab-dashboard.selectorLabels" . | nindent 4 }}