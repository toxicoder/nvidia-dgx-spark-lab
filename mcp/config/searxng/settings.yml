# Purpose: SearXNG instance settings for MCP search stack
# Source of truth: this file
# Regenerate: n/a
# Safety: replace secret_key before production use

use_default_settings: true

general:
  instance_name: "DGX Spark Lab Search"

server:
  secret_key: "change-me-in-secret"
  limiter: false
  image_proxy: false

search:
  safe_search: 1
  autocomplete: ""
  formats:
    - html
    - json

redis:
  url: redis://redis.agent-tools.svc.cluster.local:6379/0

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
