# Purpose: Configuration for MCP searxng
# Source of truth: mcp/k8s/workloads/searxng/
# Regenerate: n/a
# Safety: config changes may require pod restart

apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: agent-tools
data:
  settings.yml: |
    use_default_settings: true
    general:
      instance_name: "DGX Spark Lab Search"
    server:
      secret_key: "lab-searxng-dev-only"
      limiter: false
      image_proxy: false
    search:
      safe_search: 1
      autocomplete: ""
      formats:
        - html
        - json
    redis:
      url: redis://redis.agent-tools.svc.cluster.local:6379/0
    outgoing:
      request_timeout: 10.0
      max_request_timeout: 15.0
