# Purpose: Kustomize bundle for MCP searxng
# Source of truth: mcp/k8s/workloads/searxng/
# Regenerate: n/a
# Safety: agent-tools namespace; moderate resources

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: searxng-settings
    files:
      - settings.yml
    options:
      disableNameSuffixHash: true

resources:
  - deployment.yaml
  - service.yaml
