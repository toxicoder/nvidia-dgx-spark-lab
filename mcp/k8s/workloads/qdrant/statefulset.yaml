# Purpose: StatefulSet for MCP qdrant persistent storage
# Source of truth: mcp/k8s/workloads/qdrant/
# Regenerate: n/a
# Safety: uses PVC; data persists across restarts

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: agent-tools
  labels:
    app: qdrant
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      priorityClassName: lab-optional
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.13.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
