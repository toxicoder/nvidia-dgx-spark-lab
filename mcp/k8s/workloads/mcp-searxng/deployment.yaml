# Purpose: Deployment for MCP mcp searxng
# Source of truth: mcp/k8s/workloads/mcp-searxng/
# Regenerate: n/a
# Safety: review egress network policies

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-searxng
  namespace: agent-tools
  labels:
    app: mcp-searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-searxng
  template:
    metadata:
      labels:
        app: mcp-searxng
    spec:
      priorityClassName: lab-optional
      containers:
        - name: gateway
          image: lab-mcp/mcp-searxng:local
          imagePullPolicy: IfNotPresent
          env:
            - name: SEARXNG_URL
              value: "http://searxng.agent-tools.svc.cluster.local:8080/"
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
