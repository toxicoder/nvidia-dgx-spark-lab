# Purpose: Service for MCP mcp memory
# Source of truth: mcp/k8s/workloads/mcp-memory/
# Regenerate: n/a
# Safety: NodePort from mcp-policy.yaml

apiVersion: v1
kind: Service
metadata:
  name: mcp-memory
  namespace: agent-tools
  labels:
    app: mcp-memory
spec:
  selector:
    app: mcp-memory
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 32105
      name: http
  type: NodePort
