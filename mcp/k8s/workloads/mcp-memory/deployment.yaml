# Purpose: Deployment for MCP mcp memory
# Source of truth: mcp/k8s/workloads/mcp-memory/
# Regenerate: n/a
# Safety: review egress network policies

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-memory
  namespace: agent-tools
  labels:
    app: mcp-memory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-memory
  template:
    metadata:
      labels:
        app: mcp-memory
    spec:
      priorityClassName: lab-optional
      containers:
        - name: gateway
          image: lab-mcp/mcp-memory:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: memory-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: memory-data
          persistentVolumeClaim:
            claimName: mcp-memory-data
