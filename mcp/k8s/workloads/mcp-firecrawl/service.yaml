# Purpose: Service for MCP mcp firecrawl
# Source of truth: mcp/k8s/workloads/mcp-firecrawl/
# Regenerate: n/a
# Safety: NodePort from mcp-policy.yaml

apiVersion: v1
kind: Service
metadata:
  name: mcp-firecrawl
  namespace: agent-tools
  labels:
    app: mcp-firecrawl
spec:
  selector:
    app: mcp-firecrawl
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 32106
      name: http
  type: NodePort
