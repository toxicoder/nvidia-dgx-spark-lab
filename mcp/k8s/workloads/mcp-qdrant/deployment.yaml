# Purpose: Deployment for MCP mcp qdrant
# Source of truth: mcp/k8s/workloads/mcp-qdrant/
# Regenerate: n/a
# Safety: review egress network policies

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-qdrant
  namespace: agent-tools
  labels:
    app: mcp-qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-qdrant
  template:
    metadata:
      labels:
        app: mcp-qdrant
    spec:
      priorityClassName: lab-optional
      containers:
        - name: mcp-qdrant
          image: lab-mcp/mcp-qdrant:local
          imagePullPolicy: IfNotPresent
          env:
            - name: QDRANT_URL
              value: "http://qdrant.agent-tools.svc.cluster.local:6333"
            - name: COLLECTION_NAME
              value: agent-memory
            - name: QDRANT_READ_ONLY
              value: "false"
            - name: FASTMCP_SERVER_HOST
              value: "0.0.0.0"
            - name: FASTMCP_SERVER_PORT
              value: "8000"
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
