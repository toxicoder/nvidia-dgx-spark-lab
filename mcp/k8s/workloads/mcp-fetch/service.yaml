# Purpose: Service for MCP mcp fetch
# Source of truth: mcp/k8s/workloads/mcp-fetch/
# Regenerate: n/a
# Safety: NodePort from mcp-policy.yaml

apiVersion: v1
kind: Service
metadata:
  name: mcp-fetch
  namespace: agent-tools
  labels:
    app: mcp-fetch
spec:
  selector:
    app: mcp-fetch
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 32101
      name: http
  type: NodePort
