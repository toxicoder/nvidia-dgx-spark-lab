# Purpose: Kustomize bundle for MCP doc ingest
# Source of truth: mcp/k8s/workloads/doc-ingest/
# Regenerate: n/a
# Safety: agent-tools namespace; moderate resources

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: doc-ingest-config
    files:
      - DOC_SOURCES_JSON=doc-sources.json

resources:
  - cronjob.yaml

generatorOptions:
  disableNameSuffixHash: true
