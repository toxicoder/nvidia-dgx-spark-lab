# Purpose: Kustomize root listing base cluster resources
# Source of truth: this file
# Regenerate: n/a
# Safety: apply before workloads

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - namespaces-dev.yaml
  - namespaces-sso.yaml
  - resource-guard/priority-classes.yaml
  - resource-guard/resource-quotas.yaml
  - resource-guard/limit-ranges.yaml
  - resource-guard/pod-disruption-budgets.yaml

commonLabels:
  app.kubernetes.io/part-of: nvidia-dgx-spark-lab
  app.kubernetes.io/managed-by: kustomize
