# Purpose: Kustomize bundle for GPU time-slicing ConfigMap
# Source of truth: k8s/base/gpu-time-slicing/
# Regenerate: n/a
# Safety: does not enable time-slicing until device plugin is reconfigured

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: time-slicing-config
    namespace: gpu-operator
    files:
      - any=any.yaml
    options:
      labels:
        app.kubernetes.io/part-of: nvidia-dgx-spark-lab
        app.kubernetes.io/component: gpu-time-slicing
      disableNameSuffixHash: true
