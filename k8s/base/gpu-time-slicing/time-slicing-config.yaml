# Purpose: NVIDIA device-plugin time-slicing for dual logical GPUs on 1× GB10
# Source of truth: k8s/base/gpu-time-slicing/
# Regenerate: n/a
# Safety: opt-in for dual concurrent Qwen3.6 (and similar) only; apply via manage/ansible

# Replicas=2 makes the node advertise 2× nvidia.com/gpu so two inference Jobs can schedule.
# Each process must still fit weights+KV via --gpu-memory-utilization (dual ~0.38 each).
apiVersion: v1
kind: ConfigMap
metadata:
  name: time-slicing-config
  namespace: gpu-operator
  labels:
    app.kubernetes.io/part-of: nvidia-dgx-spark-lab
    app.kubernetes.io/component: gpu-time-slicing
data:
  any: |-
    version: v1
    sharing:
      timeSlicing:
        resources:
          - name: nvidia.com/gpu
            replicas: 2
