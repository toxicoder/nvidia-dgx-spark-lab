# Purpose: Example auth secrets template
# Source of truth: this file
# Regenerate: n/a
# Safety: copy and fill real values; never commit secrets

# Example secrets for SSO stack. Generate via: ./scripts/manage.sh sso ensure-secrets
# Do not commit real values.
---
apiVersion: v1
kind: Secret
metadata:
  name: authelia-secrets
  namespace: auth
type: Opaque
stringData:
  users_database.yml: |
    users:
      admin:
        displayname: Lab Admin
        password: "$argon2id$v=19$m=65536,t=3,p=4$REPLACE_WITH_GENERATED_HASH"
        email: admin@lab.local
        groups:
          - admins
          - devs
  configuration-overrides.yml: |
    storage:
      encryption_key: "replace-with-32-byte-hex"
    identity_providers:
      oidc:
        hmac_secret: "replace-with-32-byte-hex"
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secrets
  namespace: auth
type: Opaque
stringData:
  client-secret: "replace-me"
  cookie-secret: "replace-with-32-byte-base64"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-oidc-clients
  namespace: auth
type: Opaque
stringData:
  coder-client-id: coder
  coder-client-secret: "replace-me"
  headlamp-client-id: headlamp
  headlamp-client-secret: "replace-me"
  oauth2-proxy-client-id: oauth2-proxy
  oauth2-proxy-client-secret: "replace-me"
