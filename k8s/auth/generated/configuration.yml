# Generated by render-domains.sh — do not edit.
theme: dark
server:
  address: 'tcp://0.0.0.0:9091'
  endpoints:
    authz:
      forward-auth:
        implementation: ForwardAuth
log:
  level: info
totp:
  issuer: spark-lab.local
authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2
      iterations: 3
      key_length: 32
      salt_length: 16
      memory: 65536
      parallelism: 4
access_control:
  default_policy: deny
  rules:
        - domain: "auth.lab.local"
          policy: bypass
        - domain: "oauth.lab.local"
          policy: bypass
        - domain: "*.lab.local"
          policy: one_factor
session:
  name: authelia_session
  expiration: 12h
  inactivity: 45m
  cookies:
        - domain: lab.local
          authelia_url: https://auth.lab.local
          default_redirection_url: https://dashboard.lab.local
  redis:
    host: authelia-redis.auth.svc.cluster.local
    port: 6379
storage:
  local:
    path: /config/db.sqlite3
notifier:
  filesystem:
    filename: /config/notification.txt
# OIDC provider keys and clients are injected from authelia-secrets (see scripts/lib/sso.sh).
