# Purpose: ClusterIssuer for lab CA and ACME TLS
# Source of truth: config/lab-domains.yaml
# Regenerate: n/a
# Safety: issuer misconfig breaks TLS

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-selfsigned-ca
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-selfsigned-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: lab-selfsigned-ca
  secretName: lab-selfsigned-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: lab-selfsigned-ca
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca-issuer
spec:
  ca:
    secretName: lab-selfsigned-ca
