# Purpose: Prometheus scrape configuration ConfigMap for the monitoring stack
# Source of truth: generated from config/monitoring-probes.yaml via monitoring_generate_prometheus_scrape_config
# Regenerate: monitoring-stack.sh or manage.sh start-monitoring
# Safety: read-only scrape targets; no cluster credentials

apiVersion: v1
data:
  prometheus.yml: "global:\n  evaluation_interval: 30s\n  scrape_interval: 30s\nscrape_configs:\n\
    - job_name: prometheus\n  static_configs:\n  - targets:\n    - localhost:9090\n\
    - job_name: node-exporter\n  kubernetes_sd_configs:\n  - namespaces:\n      names:\n\
    \      - monitoring\n    role: endpoints\n  relabel_configs:\n  - action: keep\n\
    \    regex: node-exporter-prometheus-node-exporter\n    source_labels:\n    -\
    \ __meta_kubernetes_service_name\n  - action: keep\n    regex: metrics\n    source_labels:\n\
    \    - __meta_kubernetes_endpoint_port_name\n  - source_labels:\n    - __meta_kubernetes_pod_node_name\n\
    \    target_label: node\n- job_name: dcgm\n  kubernetes_sd_configs:\n  - namespaces:\n\
    \      names:\n      - gpu-operator\n    role: endpoints\n  relabel_configs:\n\
    \  - action: keep\n    regex: nvidia-dcgm-exporter\n    source_labels:\n    -\
    \ __meta_kubernetes_service_name\n  - source_labels:\n    - __meta_kubernetes_pod_node_name\n\
    \    target_label: node\n- job_name: kube-state-metrics\n  kubernetes_sd_configs:\n\
    \  - namespaces:\n      names:\n      - monitoring\n    role: endpoints\n  relabel_configs:\n\
    \  - action: keep\n    regex: kube-state-metrics\n    source_labels:\n    - __meta_kubernetes_service_name\n\
    - job_name: kubernetes-pods-annotated\n  kubernetes_sd_configs:\n  - role: pod\n\
    \  relabel_configs:\n  - action: keep\n    regex: 'true'\n    source_labels:\n\
    \    - __meta_kubernetes_pod_annotation_prometheus_io_scrape\n  - regex: (.+)\n\
    \    source_labels:\n    - __meta_kubernetes_pod_annotation_prometheus_io_path\n\
    \    target_label: __metrics_path__\n  - regex: ([^:]+)(?::\\d+)?;(\\d+)\n   \
    \ replacement: $1:$2\n    source_labels:\n    - __address__\n    - __meta_kubernetes_pod_annotation_prometheus_io_port\n\
    \    target_label: __address__\n  - source_labels:\n    - __meta_kubernetes_namespace\n\
    \    target_label: namespace\n  - source_labels:\n    - __meta_kubernetes_pod_name\n\
    \    target_label: pod\n  - source_labels:\n    - __meta_kubernetes_pod_label_app\n\
    \    target_label: app\n- job_name: kubernetes-services-annotated\n  kubernetes_sd_configs:\n\
    \  - role: service\n  relabel_configs:\n  - action: keep\n    regex: 'true'\n\
    \    source_labels:\n    - __meta_kubernetes_service_annotation_prometheus_io_scrape\n\
    \  - regex: (.+)\n    source_labels:\n    - __meta_kubernetes_service_annotation_prometheus_io_path\n\
    \    target_label: __metrics_path__\n  - regex: ([^:]+)(?::\\d+)?;(\\d+)\n   \
    \ replacement: $1:$2\n    source_labels:\n    - __address__\n    - __meta_kubernetes_service_annotation_prometheus_io_port\n\
    \    target_label: __address__\n  - source_labels:\n    - __meta_kubernetes_namespace\n\
    \    target_label: namespace\n  - source_labels:\n    - __meta_kubernetes_service_name\n\
    \    target_label: service\n- job_name: traefik\n  kubernetes_sd_configs:\n  -\
    \ namespaces:\n      names:\n      - traefik\n    role: endpoints\n  relabel_configs:\n\
    \  - action: keep\n    regex: traefik\n    source_labels:\n    - __meta_kubernetes_service_name\n\
    \  - action: keep\n    regex: metrics\n    source_labels:\n    - __meta_kubernetes_endpoint_port_name\n\
    - job_name: ray-head\n  kubernetes_sd_configs:\n  - namespaces:\n      names:\n\
    \      - ai-inference\n    role: service\n  metrics_path: /metrics\n  relabel_configs:\n\
    \  - action: keep\n    regex: ray-head\n    source_labels:\n    - __meta_kubernetes_service_name\n\
    - job_name: blackbox-cluster\n  metrics_path: /probe\n  params:\n    module:\n\
    \    - http_2xx\n  relabel_configs:\n  - source_labels:\n    - __address__\n \
    \   target_label: __param_target\n  - source_labels:\n    - __param_target\n \
    \   target_label: instance\n  - replacement: blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115\n\
    \    target_label: __address__\n  static_configs:\n  - labels:\n      probe_type:\
    \ cluster\n    targets:\n    - prometheus-server.monitoring.svc.cluster.local:80\n\
    \    - kube-state-metrics.monitoring.svc.cluster.local:8080\n    - traefik.traefik.svc.cluster.local:9100\n\
    \    - cert-manager.cert-manager.svc.cluster.local:9402\n    - authelia.auth.svc.cluster.local:9959\n\
    \    - nvidia-dcgm-exporter.gpu-operator.svc.cluster.local:9400\n- job_name: blackbox-inference\n\
    \  metrics_path: /probe\n  params:\n    module:\n    - http_2xx\n  relabel_configs:\n\
    \  - source_labels:\n    - __address__\n    target_label: __param_target\n  -\
    \ source_labels:\n    - __param_target\n    target_label: instance\n  - replacement:\
    \ blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115\n\
    \    target_label: __address__\n  static_configs:\n  - labels:\n      probe_type:\
    \ inference\n    targets:\n    - kimi-test.ai-inference.svc.cluster.local:8000\n\
    \    - kimi.ai-inference.svc.cluster.local:8000\n    - nemotron-3-ultra.ai-inference.svc.cluster.local:8000\n\
    \    - nemotron-3-nano-30b.ai-inference.svc.cluster.local:8000\n    - nemotron-3-nano-omni-30b.ai-inference.svc.cluster.local:8000\n\
    \    - nemotron-3-super-120b.ai-inference.svc.cluster.local:8000\n    - glm-5.2.ai-inference.svc.cluster.local:8000\n\
    \    - qwen3.5-122b-a10b-nvfp4.ai-inference.svc.cluster.local:8000\n    - qwen3.5-397b-nvfp4.ai-inference.svc.cluster.local:8000\n\
    \    - qwen3.5-397b-spark2.ai-inference.svc.cluster.local:8000\n    - nemotron-retriever-embed.ai-inference.svc.cluster.local:8000\n\
    \    - nemotron-retriever-rerank.ai-inference.svc.cluster.local:8000\n    - nemotron-parse.ai-inference.svc.cluster.local:8000\n\
    \    - nemotron-safety-guard.ai-inference.svc.cluster.local:8000\n    - nemotron-speech-asr.ai-inference.svc.cluster.local:8000\n\
    \    - nemotron-speech-tts.ai-inference.svc.cluster.local:8000\n    - ray-head.ai-inference.svc.cluster.local:8000\n\
    - job_name: blackbox-mcp\n  metrics_path: /probe\n  params:\n    module:\n   \
    \ - http_2xx\n  relabel_configs:\n  - source_labels:\n    - __address__\n    target_label:\
    \ __param_target\n  - source_labels:\n    - __param_target\n    target_label:\
    \ instance\n  - replacement: blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115\n\
    \    target_label: __address__\n  static_configs:\n  - labels:\n      probe_type:\
    \ mcp\n    targets:\n    - kubectl get node spark0 -o jsonpath={.status.addresses[?(@.type==\"\
    InternalIP\")].address}:32100\n    - kubectl get node spark0 -o jsonpath={.status.addresses[?(@.type==\"\
    InternalIP\")].address}:32101\n    - kubectl get node spark0 -o jsonpath={.status.addresses[?(@.type==\"\
    InternalIP\")].address}:32102\n    - kubectl get node spark0 -o jsonpath={.status.addresses[?(@.type==\"\
    InternalIP\")].address}:32103\n    - kubectl get node spark0 -o jsonpath={.status.addresses[?(@.type==\"\
    InternalIP\")].address}:32104\n    - kubectl get node spark0 -o jsonpath={.status.addresses[?(@.type==\"\
    InternalIP\")].address}:32105\n    - kubectl get node spark0 -o jsonpath={.status.addresses[?(@.type==\"\
    InternalIP\")].address}:32106\n- job_name: blackbox-host\n  metrics_path: /probe\n\
    \  params:\n    module:\n    - http_2xx\n  relabel_configs:\n  - source_labels:\n\
    \    - __address__\n    target_label: __param_target\n  - source_labels:\n   \
    \ - __param_target\n    target_label: instance\n  - replacement: blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115\n\
    \    target_label: __address__\n  static_configs:\n  - labels:\n      probe_type:\
    \ host\n    targets:\n    - http://kubectl get node spark0 -o jsonpath={.status.addresses[?(@.type==\"\
    InternalIP\")].address}:8642/v1/models\n    - http://kubectl get node spark0 -o\
    \ jsonpath={.status.addresses[?(@.type==\"InternalIP\")].address}:9119/\n"
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/part-of: spark-lab-monitoring
  name: prometheus-scrape-config
  namespace: monitoring
