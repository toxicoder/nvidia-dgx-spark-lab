# Purpose: Traefik HTTP-to-HTTPS redirect middleware
# Source of truth: n/a
# Regenerate: n/a
# Safety: forces TLS on matched routes

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: auth
  labels:
    app.kubernetes.io/part-of: nvidia-dgx-spark-lab
spec:
  redirectScheme:
    scheme: https
    permanent: true
