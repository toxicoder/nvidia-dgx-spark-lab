# Purpose: Kubernetes Service for nemotron speech asr inference endpoint
# Source of truth: k8s/workloads/nemotron-speech-asr/
# Regenerate: n/a
# Safety: exposes inference API; protect with SSO ingress

apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
  name: nemotron-speech-asr
  namespace: ai-inference
  labels:
    app: nemotron-speech-asr
spec:
  selector:
    app: nemotron-speech-asr
  ports:
    - port: 9000
      targetPort: 9000
      name: http
  type: ClusterIP
