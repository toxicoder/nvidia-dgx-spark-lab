# Purpose: Qwen3.5 397B Spark2 inference Job manifest
# Source of truth: k8s/workloads/qwen3.5-397b-spark2/
# Regenerate: n/a
# Safety: manual start only; consumes significant GPU/CPU resources

apiVersion: batch/v1
kind: Job
metadata:
  name: qwen3.5-397b-spark2
  namespace: ai-inference
  labels:
    app: qwen3.5-397b-spark2
    workload: inference
    mode: production
    family: qwen3.5
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app: qwen3.5-397b-spark2
        workload: inference
        mode: production
        family: qwen3.5
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      restartPolicy: OnFailure
      hostNetwork: true
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: nvidia-dgx-spark/highspeed
                    operator: In
                    values:
                      - "dual-400g"
      containers:
        - name: inference
          # Qwen 3.5 397B int4-AutoRound — 2-node substitute for 397B NVFP4 (proven dual-Spark).
          # Requires Ray head+worker and vLLM cu130-nightly + transformers 5.x patches.
          image: vllm/vllm-openai:cu130-nightly
          imagePullPolicy: IfNotPresent

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "16"
              memory: "110Gi"
              nvidia.com/gpu: "2"
            limits:
              cpu: "32"
              memory: "240Gi"
              nvidia.com/gpu: "2"
          env:
            - name: NCCL_SOCKET_IFNAME
              value: "enp1s0f0np0,enp1s0f1np1"
            - name: NCCL_IB_HCA
              value: "mlx5_0,mlx5_1"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_DEBUG_SUBSYS
              value: "ALL"
            - name: NCCL_P2P_DISABLE
              value: "0"
            - name: NCCL_SHM_DISABLE
              value: "0"
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: NCCL_SOCKET_NTHREADS
              value: "4"
            - name: NCCL_NSOCKS_PERTHREAD
              value: "4"
            - name: RAY_ADDRESS
              value: "ray://ray-head:6379"
            - name: MODEL_NAME
              value: "Intel/Qwen3.5-397B-A17B-int4-AutoRound"
            - name: HF_HOME
              value: "/models"
            - name: VLLM_PORT
              value: "8000"
            - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"
            - name: VLLM_MARLIN_USE_ATOMIC_ADD
              value: "1"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 20
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 10
          command: ["/bin/sh", "-c"]
          args:
            - >
              exec vllm serve "${MODEL_NAME}"
              --host 0.0.0.0
              --port 8000
              --tensor-parallel-size 2
              --distributed-executor-backend ray
              --trust-remote-code
              --reasoning-parser qwen3
              --enable-auto-tool-choice
              --tool-call-parser qwen3_coder
              --max-model-len 131072
              --max-num-seqs 16
              --enable-prefix-caching
              --gpu-memory-utilization 0.85
              --kv-cache-dtype fp8
              --load-format fastsafetensors
              --ray-address ray://ray-head:6379
          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: model-storage
          hostPath:
            path: /mnt/models
            type: DirectoryOrCreate
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
