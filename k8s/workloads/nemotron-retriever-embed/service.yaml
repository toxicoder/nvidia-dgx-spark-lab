# Purpose: Kubernetes Service for nemotron retriever embed inference endpoint
# Source of truth: k8s/workloads/nemotron-retriever-embed/
# Regenerate: n/a
# Safety: exposes inference API; protect with SSO ingress

apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
  name: nemotron-retriever-embed
  namespace: ai-inference
  labels:
    app: nemotron-retriever-embed
spec:
  selector:
    app: nemotron-retriever-embed
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
