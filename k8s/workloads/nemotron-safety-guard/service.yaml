# Purpose: Kubernetes Service for nemotron safety guard inference endpoint
# Source of truth: k8s/workloads/nemotron-safety-guard/
# Regenerate: n/a
# Safety: exposes inference API; protect with SSO ingress

apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
  name: nemotron-safety-guard
  namespace: ai-inference
  labels:
    app: nemotron-safety-guard
spec:
  selector:
    app: nemotron-safety-guard
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
