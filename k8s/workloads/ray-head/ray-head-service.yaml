# Purpose: Service for ray head component
# Source of truth: k8s/workloads/ray-head/
# Regenerate: n/a
# Safety: internal cluster networking only

apiVersion: v1
kind: Service
metadata:
  name: ray-head
  namespace: ai-inference
spec:
  selector:
    app: ray-head
  ports:
    - port: 6379
      targetPort: 6379
      name: ray
    - port: 8265
      targetPort: 8265
      name: dashboard
  type: ClusterIP
