# Purpose: Nemotron Parse inference Deployment manifest
# Source of truth: k8s/workloads/nemotron-parse/
# Regenerate: n/a
# Safety: manual start only; consumes significant GPU/CPU resources

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemotron-parse
  namespace: ai-inference
  labels:
    app: nemotron-parse
    workload: inference
    runtime: nim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nemotron-parse
  template:
    metadata:
      labels:
        app: nemotron-parse
        workload: inference
        runtime: nim
    spec:
      containers:
        - name: nim
          image: nvcr.io/nim/nvidia/nemotron-parse:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: NIM_CACHE_PATH
              value: "/models/nim-cache"
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          hostPath:
            path: /mnt/models
            type: DirectoryOrCreate
