# Purpose: Kubernetes Service for nemotron 3 super 120b inference endpoint
# Source of truth: k8s/workloads/nemotron-3-super-120b/
# Regenerate: n/a
# Safety: exposes inference API; protect with SSO ingress

apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
  name: nemotron-3-super-120b
  namespace: ai-inference
  labels:
    app: nemotron-3-super-120b
spec:
  selector:
    app: nemotron-3-super-120b
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
