# Purpose: Nemotron 3 Nano Omni 30B inference Job manifest
# Source of truth: k8s/workloads/nemotron-3-nano-omni-30b/
# Regenerate: n/a
# Safety: manual start only; consumes significant GPU/CPU resources

apiVersion: batch/v1
kind: Job
metadata:
  name: nemotron-3-nano-omni-30b
  namespace: ai-inference
  labels:
    app: nemotron-3-nano-omni-30b
    workload: inference
    mode: production
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app: nemotron-3-nano-omni-30b
        workload: inference
        mode: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      restartPolicy: OnFailure
      # hostNetwork omitted (default false); explicit NCCL_* + IFNAME sufficient. See kimi-test / models-catalog.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: nvidia-dgx-spark/highspeed
                    operator: In
                    values:
                      - "dual-400g"
            - weight: 50
              preference:
                matchExpressions:
                  - key: nvidia-dgx-spark/role
                    operator: In
                    values:
                      - "worker"
                      - "control-plane-worker"

      containers:
        - name: inference
          image: vllm/vllm-openai:v0.8.5
          imagePullPolicy: IfNotPresent

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "4"
              memory: "45Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "90Gi"
              nvidia.com/gpu: "1"
          env:
            - name: NCCL_SOCKET_IFNAME
              value: "enp1s0f0np0,enp1s0f1np1"
            - name: NCCL_IB_HCA
              value: "mlx5_0,mlx5_1"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_DEBUG_SUBSYS
              value: "ALL"
            - name: NCCL_P2P_DISABLE
              value: "0"
            - name: NCCL_SHM_DISABLE
              value: "0"
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: NCCL_SOCKET_NTHREADS
              value: "4"
            - name: NCCL_NSOCKS_PERTHREAD
              value: "4"

            - name: MODEL_NAME
              value: "nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4"
            - name: HF_HOME
              value: "/models"
            - name: VLLM_PORT
              value: "8000"
            - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          command: ["/bin/sh", "-c"]
          args:
            - >
              exec python3 -m vllm.entrypoints.openai.api_server
              --model "${MODEL_NAME}"
              --host 0.0.0.0
              --port 8000
              --tensor-parallel-size 1
              --gpu-memory-utilization 0.60
              --max-model-len 131072
              --quantization nvfp4
          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: model-storage
          hostPath:
            path: /mnt/models
            type: DirectoryOrCreate
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
