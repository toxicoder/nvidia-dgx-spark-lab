# Purpose: Kubernetes Service for kimi test inference endpoint
# Source of truth: k8s/workloads/kimi-test/
# Regenerate: n/a
# Safety: exposes inference API; protect with SSO ingress

apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
  name: kimi-test
  namespace: ai-inference
  labels:
    app: kimi-test
spec:
  selector:
    app: kimi-test
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
