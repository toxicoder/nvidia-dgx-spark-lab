# Purpose: Kimi Test inference Job manifest
# Source of truth: k8s/workloads/kimi-test/
# Regenerate: n/a
# Safety: manual start only; consumes significant GPU/CPU resources

apiVersion: batch/v1
kind: Job
metadata:
  name: kimi-test
  namespace: ai-inference
  labels:
    app: kimi-test
    workload: inference
    mode: test
spec:
  # Low backoff - do not thrash on failure
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600 # auto-cleanup completed job after 1h
  template:
    metadata:
      labels:
        app: kimi-test
        workload: inference
        mode: test
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      restartPolicy: OnFailure
      # hostNetwork omitted (default false); explicit NCCL_* + IFNAME sufficient. Decision: keep on heavy ray jobs (nemotron/glm) only; kimi-test keeps isolation. See models-catalog.

      # Prefer nodes with high-speed interconnect label (works for 1 node or 2-4 node clusters)
      # For 1 node: all GPUs on the single control-plane/worker.
      # For 2-4 nodes: spread across highspeed-linked nodes for multi-node NCCL.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: nvidia-dgx-spark/highspeed
                    operator: In
                    values:
                      - "dual-400g"
            - weight: 50
              preference:
                matchExpressions:
                  - key: nvidia-dgx-spark/role
                    operator: In
                    values:
                      - "worker"
                      - "control-plane-worker"

      containers:
        - name: inference
          image: vllm/vllm-openai:v0.8.5 # unified pin v0.8.5 (MoE/FP8/aarch64 support); see models-catalog
          imagePullPolicy: IfNotPresent

          # Minimal lab hardening (matches production kimi pattern; scaled probe delays below).
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          # Lighter / safer profile for testing (example for 1 node or small scale)
          # Scale tensor-parallel-size and GPU count based on your setup (1-4 nodes).
          # For 1 node: use local multi-GPU (e.g. 2-8 GPUs on single host).
          resources:
            requests:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: "2"
            limits:
              cpu: "16"
              memory: "64Gi"
              nvidia.com/gpu: "2"

          env:
            # === HIGH-SPEED INTERCONNECT CONFIGURATION ===
            # For 2-4 nodes: utilize dual 400G links. For 1 node: local multi-GPU NCCL (SHM/P2P).
            # Kept in sync with the full production (kimi) manifest for representative test behavior.
            - name: NCCL_SOCKET_IFNAME
              value: "enp1s0f0np0,enp1s0f1np1"
            - name: NCCL_IB_HCA
              value: "mlx5_0,mlx5_1"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_DEBUG_SUBSYS
              value: "ALL"
            - name: NCCL_P2P_DISABLE
              value: "0"
            - name: NCCL_SHM_DISABLE
              value: "0"
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: NCCL_SOCKET_NTHREADS
              value: "4"
            - name: NCCL_NSOCKS_PERTHREAD
              value: "4"

            # Model / server configuration (lighter)
            - name: MODEL_NAME
              value: "test-model" # Replace with actual model id or path
            - name: HF_HOME
              value: "/models"
            - name: VLLM_PORT
              value: "8000"

            # Important for stability on large models
            - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"

          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          # Scaled-down probes vs production kimi (lighter model loads faster).
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10

          # Shell wrapper so MODEL_NAME env var expands (K8s does not expand $(MODEL_NAME) in args).
          command: ["/bin/sh", "-c"]
          args:
            - >
              exec python3 -m vllm.entrypoints.openai.api_server
              --model "${MODEL_NAME}"
              --host 0.0.0.0
              --port 8000
              --tensor-parallel-size 2
              --gpu-memory-utilization 0.85
              --max-model-len 8192
              --enforce-eager

          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: shm
              mountPath: /dev/shm

          # Safety: do not let the container run forever without supervision
          # Adjust or remove for long-running serving
          # lifecycle:
          #   preStop:
          #     exec:
          #       command: ["/bin/sh", "-c", "sleep 10"]

      volumes:
        - name: model-storage
          hostPath:
            path: /mnt/models
            type: DirectoryOrCreate
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

      # Tolerate common node pressure if needed (optional)
      # tolerations:
      #   - key: "node.kubernetes.io/unreachable"
      #     operator: "Exists"
      #     effect: "NoExecute"
      #     tolerationSeconds: 30
