# Purpose: Qwen3.6 27B NVFP4 dense inference Job (quality-focused, exclusive defaults)
# Source of truth: k8s/workloads/qwen3.6-27b-nvfp4/
# Regenerate: n/a
# Safety: manual start only; dual overlay lowers gpu-mem-util for concurrent use

apiVersion: batch/v1
kind: Job
metadata:
  name: qwen3.6-27b-nvfp4
  namespace: ai-inference
  labels:
    app: qwen3.6-27b-nvfp4
    workload: inference
    mode: production
    family: qwen3.6
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app: qwen3.6-27b-nvfp4
        workload: inference
        mode: production
        family: qwen3.6
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      restartPolicy: OnFailure
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: nvidia-dgx-spark/highspeed
                    operator: In
                    values:
                      - "dual-400g"
      containers:
        - name: inference
          # Unsloth W4A4 NVFP4 + MTP; Blackwell GB10 needs CUTE_DSL_ARCH=sm_121a.
          image: vllm/vllm-openai:cu130-nightly
          imagePullPolicy: IfNotPresent

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "8"
              memory: "48Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: "56Gi"
              nvidia.com/gpu: "1"
          env:
            - name: NCCL_SOCKET_IFNAME
              value: "enp1s0f0np0,enp1s0f1np1"
            - name: NCCL_IB_HCA
              value: "mlx5_0,mlx5_1"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_P2P_DISABLE
              value: "0"
            - name: NCCL_SHM_DISABLE
              value: "0"
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: CUTE_DSL_ARCH
              value: "sm_121a"
            - name: MODEL_NAME
              value: "unsloth/Qwen3.6-27B-NVFP4"
            - name: HF_HOME
              value: "/models"
            - name: VLLM_PORT
              value: "8000"
            - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"
            # Exclusive defaults; dual overlay sets LAB_QWEN36_GPU_UTIL / MAX_LEN lower.
            - name: LAB_QWEN36_GPU_UTIL
              value: "0.72"
            - name: LAB_QWEN36_MAX_LEN
              value: "131072"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 360
            periodSeconds: 30
            timeoutSeconds: 10
          command: ["/bin/sh", "-c"]
          args:
            - >
              exec vllm serve "${MODEL_NAME}"
              --host 0.0.0.0
              --port 8000
              --tensor-parallel-size 1
              --trust-remote-code
              --reasoning-parser qwen3
              --enable-prefix-caching
              --kv-cache-dtype fp8
              --gpu-memory-utilization "${LAB_QWEN36_GPU_UTIL}"
              --max-model-len "${LAB_QWEN36_MAX_LEN}"
              --speculative-config '{"method":"mtp","num_speculative_tokens":2}'
              --limit-mm-per-prompt image=4
          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: model-storage
          hostPath:
            path: /mnt/models
            type: DirectoryOrCreate
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
