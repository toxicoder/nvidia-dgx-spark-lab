# Purpose: Dual-concurrent memory/context patch for Qwen3.6 Jobs
# Source of truth: k8s/overlays/single-node/qwen36-dual/
# Regenerate: n/a
# Safety: splits unified memory so both models fit ~128 GB

# Strategic merge applied per-Job via kustomize target name.
# Lowers gpu-mem-util and max-model-len for side-by-side serving.
apiVersion: batch/v1
kind: Job
metadata:
  name: ignored
spec:
  template:
    spec:
      containers:
        - name: inference
          env:
            - name: LAB_QWEN36_GPU_UTIL
              value: "0.38"
            - name: LAB_QWEN36_MAX_LEN
              value: "65536"
