name: CI - Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      bazel-core: ${{ steps.filter.outputs.bazel-core }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      docs: ${{ steps.filter.outputs.docs }}
      ci-graph: ${{ steps.filter.outputs.ci-graph }}
      ci-workflow: ${{ steps.filter.outputs.ci-workflow }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            bazel-core:
              - 'scripts/**'
              - 'k8s/**'
              - 'mcp/**'
              - 'hermes/**'
              - 'config/**'
              - 'ansible/**'
              - 'tests/**'
              - 'lints/**'
              - 'helm/**'
            dashboard:
              - 'dashboard/**'
              - 'scripts/utilities/**'
            # Shell doc sources only — not every scripts/** path (avoids Playwright
            # for pure validate/CI orchestration edits).
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - 'scripts/manage.sh'
              - 'scripts/lib/**'
              - 'scripts/utilities/**'
            # Graph/orchestrator: force all expensive jobs.
            ci-graph:
              - 'BUILD.bazel'
              - 'MODULE.bazel'
              - 'MODULE.bazel.lock'
              - '.bazelrc'
              - '.bazelversion'
              - 'fix.sh'
              - 'scripts/validate.sh'
            # Workflow/action YAML alone: bazel-core only (setup-bazel / lint install).
            ci-workflow:
              - '.github/**'
              - '.gitea/**'

  bazel-core:
    needs: changes
    if: |
      needs.changes.outputs.bazel-core == 'true' ||
      needs.changes.outputs.ci-graph == 'true' ||
      needs.changes.outputs.ci-workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-bazel
        with:
          install-lint-tools: "true"

      - name: Bazel test (fast core) and lint
        run: |
          bazelisk test //:test-fast //:lint --config=ci --test_tag_filters=manual

      - name: Bazel build of key targets
        run: bazelisk build //:manage //:all --config=ci

  dashboard-unit:
    needs: changes
    if: |
      needs.changes.outputs.dashboard == 'true' ||
      needs.changes.outputs.ci-graph == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - uses: ./.github/actions/setup-bazel
        with:
          install-lint-tools: "false"

      - name: Dashboard fast tests (Vitest + lint + typecheck)
        run: bazelisk run //dashboard:fast-test

  dashboard-hermetic:
    needs: [changes, dashboard-unit]
    if: |
      always() &&
      !cancelled() &&
      (needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.ci-graph == 'true') &&
      (needs.dashboard-unit.result == 'success' || needs.dashboard-unit.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build hermetic dashboard test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dashboard/Dockerfile.test
          load: true
          tags: lab-dashboard-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Unit already ran Vitest+lint+tsc on the host; hermetic focuses on
      # production build + Playwright (and coverage when visual mode needs it).
      - name: Run hermetic tests (build + visual; unit skipped when host unit passed)
        run: |
          if [[ "${{ needs.dashboard-unit.result }}" == "success" ]]; then
            docker run --rm -e DASHBOARD_TEST_MODE=visual lab-dashboard-test:ci
          else
            docker run --rm -e DASHBOARD_TEST_MODE=full lab-dashboard-test:ci
          fi

  docs-and-render:
    needs: changes
    if: |
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.ci-graph == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - uses: ./.github/actions/setup-bazel
        with:
          install-lint-tools: "false"

      - name: Cache pip downloads
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: pip-docs-${{ runner.os }}-${{ hashFiles('docs/requirements.txt') }}
          restore-keys: |
            pip-docs-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('docs/requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          python -m playwright install --with-deps chromium

      # Single MkDocs build + HTML checks + Playwright (one setUpClass build).
      - name: Docs build + visual regression (single MkDocs build)
        run: bazelisk test //docs:test_mkdocs_render --config=ci

  validate-gate:
    needs: [changes, bazel-core, dashboard-unit, dashboard-hermetic, docs-and-render]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Pure bash gate — no Bazelisk / disk-cache cold start.
      - name: Validate gate (path-filter consistency)
        env:
          BAZEL_CORE_RESULT: ${{ needs.bazel-core.result }}
          DASHBOARD_UNIT_RESULT: ${{ needs.dashboard-unit.result }}
          DASHBOARD_HERMETIC_RESULT: ${{ needs.dashboard-hermetic.result }}
          DOCS_RESULT: ${{ needs.docs-and-render.result }}
          RUN_BAZEL_CORE: ${{ needs.changes.outputs.bazel-core == 'true' || needs.changes.outputs.ci-graph == 'true' || needs.changes.outputs.ci-workflow == 'true' }}
          RUN_DASHBOARD: ${{ needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.ci-graph == 'true' }}
          RUN_DOCS: ${{ needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci-graph == 'true' }}
        run: bash scripts/ci_check_only.sh
