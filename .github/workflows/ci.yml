name: CI - Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      bazel-core: ${{ steps.filter.outputs.bazel-core }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      docs: ${{ steps.filter.outputs.docs }}
      ci-config: ${{ steps.filter.outputs.ci-config }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            bazel-core:
              - 'scripts/**'
              - 'k8s/**'
              - 'mcp/**'
              - 'hermes/**'
              - 'config/**'
              - 'ansible/**'
              - 'tests/**'
              - 'lints/**'
              - 'helm/**'
            dashboard:
              - 'dashboard/**'
              - 'scripts/utilities/**'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - 'scripts/**'
            ci-config:
              - '.github/**'
              - 'BUILD.bazel'
              - 'MODULE.bazel'
              - 'MODULE.bazel.lock'
              - '.bazelrc'
              - '.bazelversion'
              - 'fix.sh'
              - 'scripts/validate.sh'

  bazel-core:
    needs: changes
    if: |
      needs.changes.outputs.bazel-core == 'true' ||
      needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-bazel
        with:
          install-lint-tools: "true"

      - name: Bazel test (fast core) and lint
        run: |
          bazelisk test //:test-fast //:lint --config=ci --test_tag_filters=manual

      - name: Bazel build of key targets
        run: bazelisk build //:manage //:all --config=ci

  dashboard-unit:
    needs: changes
    if: |
      needs.changes.outputs.dashboard == 'true' ||
      needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - uses: ./.github/actions/setup-bazel
        with:
          install-lint-tools: "false"

      - name: Dashboard fast tests (Vitest + lint + typecheck)
        run: bazelisk run //dashboard:fast-test

  dashboard-hermetic:
    needs: changes
    if: |
      needs.changes.outputs.dashboard == 'true' ||
      needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and run hermetic dashboard tests
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dashboard/Dockerfile.test
          load: true
          tags: lab-dashboard-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run hermetic test container
        run: docker run --rm lab-dashboard-test:ci

  docs-and-render:
    needs: changes
    if: |
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - uses: ./.github/actions/setup-bazel
        with:
          install-lint-tools: "false"

      - name: Cache pip downloads
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: pip-docs-${{ runner.os }}-${{ hashFiles('docs/requirements.txt') }}
          restore-keys: |
            pip-docs-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('docs/requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Docs build test (fast)
        run: bazelisk test //docs:test_mkdocs_build --config=ci

      - name: Docs visual golden test
        run: bazelisk test //docs:test_mkdocs_visual --config=ci

  validate-gate:
    needs: [changes, bazel-core, dashboard-unit, dashboard-hermetic, docs-and-render]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-bazel
        with:
          install-lint-tools: "false"

      - name: Validate gate (path-filter consistency)
        env:
          BAZEL_CORE_RESULT: ${{ needs.bazel-core.result }}
          DASHBOARD_UNIT_RESULT: ${{ needs.dashboard-unit.result }}
          DASHBOARD_HERMETIC_RESULT: ${{ needs.dashboard-hermetic.result }}
          DOCS_RESULT: ${{ needs.docs-and-render.result }}
          RUN_BAZEL_CORE: ${{ needs.changes.outputs.bazel-core == 'true' || needs.changes.outputs.ci-config == 'true' }}
          RUN_DASHBOARD: ${{ needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.ci-config == 'true' }}
          RUN_DOCS: ${{ needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci-config == 'true' }}
          RUN_CI_CONFIG: ${{ needs.changes.outputs.ci-config == 'true' }}
        run: bazelisk run //:validate -- --ci --check-only
