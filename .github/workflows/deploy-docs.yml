name: Deploy Documentation

on:
  push:
    branches: [main, master, development]
    paths:
      - "docs/**"
      - "includes/**"
      - "mkdocs.yml"
      - "docs/requirements.txt"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "includes/**"
      - "mkdocs.yml"
      - "docs/requirements.txt"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bazel
        with:
          install-lint-tools: "false"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Build documentation (strict)
        env:
          # Stamp development banner when building the development version.
          DGX_DOCS_VERSION: ${{ github.ref_name == 'development' && 'development' || 'latest' }}
          MIKE_DOCS_VERSION: ${{ github.ref_name == 'development' && 'development' || 'latest' }}
        run: bazelisk run //docs:docs

      - name: Upload artifact (PR preview / fallback)
        if: github.event_name == 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      # Multi-version publish via mike → gh-pages (latest + development).
      # Requires contents:write. Preserves other versions already on gh-pages.
      - name: Configure git identity for mike
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy with mike (versioned)
        if: github.event_name == 'push'
        env:
          DGX_DOCS_VERSION: ${{ github.ref_name == 'development' && 'development' || 'latest' }}
          MIKE_DOCS_VERSION: ${{ github.ref_name == 'development' && 'development' || 'latest' }}
        run: |
          set -euo pipefail
          # Rebuild into the version alias mike expects (site/ is from //docs:docs).
          if [[ "${{ github.ref_name }}" == "development" ]]; then
            mike deploy --push --update-aliases development
          else
            # main/master → latest (default alias for the version selector).
            mike deploy --push --update-aliases latest
            mike set-default --push latest
          fi

  deploy:
    # Artifact path used for PR builds only; pushes use mike → gh-pages above.
    if: github.event_name == 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
