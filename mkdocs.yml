site_name: "nvidia-dgx-spark-lab"
site_url: "https://toxicoder.github.io/nvidia-dgx-spark-lab"
repo_url: "https://github.com/toxicoder/nvidia-dgx-spark-lab"
# Default edit target; docs/hooks.py on_config stamps this from DGX_DOCS_VERSION
# (development → edit/development/docs/, else edit/main/docs/).
edit_uri: "edit/main/docs/"

# Multi-version (latest = main, development = development branch) via mike.
# Local single-version builds ignore missing versions.json.
# Branch-aware edit_uri + GitHub source links: docs/hooks.py + DGX_DOCS_VERSION.

theme:
  name: material
  font:
    text: Open Sans
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.path # Breadcrumbs
    - navigation.top
    - navigation.prune
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts & Notes:
      - DGX Spark Notes: dgx-spark-notes.md
      - Reboot Safety: reboot-safety.md
      - Models & Resources: models-catalog.md
      - Qwen3.6 Dual Stack: qwen36-dual-stack.md
      - Visual Generative AI: visual-generative-ai.md
      - Nemotron Agentic Stack: nemotron-agentic-stack.md
      - MCP Agent Toolkit: mcp-agent-toolkit.md
      - Hermes Agent (Docker): hermes-agent.md
      - Open WebUI (Agent Chat): open-webui.md
      - SSO (Traefik + Authelia): sso.md
      - Resource Guard: resource-guard.md
      - Architecture: architecture.md
      - Monitoring & Observability: monitoring-observability.md
      - Glossary: glossary.md
  - How-to Guides:
      - Developer Environment: dev-environment.md
      - Bazel Documentation: BUILDING_WITH_BAZEL.md
      - Gitea CI Setup: gitea-ci-setup.md
      - Dev Workspaces & Dashboard: dev-workspaces.md
      - Troubleshooting: troubleshooting.md
  - Reference:
      - Project Conventions: project-conventions.md
      - Contributing to Docs: CONTRIBUTING.md
      - Code-Generated Reference:
          - Shell Commands & Helpers: generated/shell/reference.md
          - Dashboard API: generated/dashboard-api/README.md

plugins:
  - search
  - glightbox

hooks:
  # Early <script> injection for GitHub API fetch patch + optional dev banner.
  - docs/hooks.py

extra_javascript:
  - assets/javascripts/command-vars.js

extra_css:
  - assets/stylesheets/command-vars.css
  - assets/stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      # Paths relative to repo root (mkdocs is always run from the workspace root).
      base_path:
        - .
        - docs
      auto_append:
        - docs/includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/toxicoder/nvidia-dgx-spark-lab"
  version:
    provider: mike
    default: latest

watch:
  - docs/includes

# Strict mode recommended in CI
exclude_docs: |
  **/*.sh
  **/BUILD.bazel
  **/requirements.txt
  **/setup-docs.sh
  **/manage-docs.sh
  **/hooks.py
  includes/**
  includes/abbreviations.md

# strict: true   # enable via CLI flag instead: mkdocs build --strict
